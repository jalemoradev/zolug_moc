<!doctype html>
<html lang="es" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>zolug · Layout — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* ===== tokens (de base.html · tema oscuro) ===== */
  :root{
    --bg-page:#0d0c13; --bg-surface:#14121c; --bg-elevated:#1a1922;
    --text-primary:#ffffff; --text-muted:#a2a9ad;
    --accent-solid:#5a58c2; --accent-on-dark:#7474ef; --logo:#955dcd; --error:#dc424a;
    /* bordes SUAVES — hairlines de baja opacidad, como Plasma */
    --hair:rgba(255,255,255,.06);
    --border:rgba(255,255,255,.22);
    --dot:rgba(255,255,255,.04);
    --hover:rgba(255,255,255,.04);
    --topbar-h:50px; --rail-w:60px; --knob:#2a2740;
    --font:"Inter",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  }
  /* tema claro — PROVISIONAL (no medido; pendiente definir formalmente) */
  :root[data-theme="light"]{
    --bg-page:#f3f0f5; --bg-surface:#ffffff; --bg-elevated:#ffffff;
    --text-primary:#14121c; --text-muted:#5c5b66;
    --hair:rgba(0,0,0,.08); --border:rgba(0,0,0,.32);
    --dot:rgba(0,0,0,.05); --hover:rgba(0,0,0,.04); --knob:#ffffff; --logo:#14121c;
  }
  *{ box-sizing:border-box; }
  html,body{ height:100%; }
  body{ margin:0; background:var(--bg-page); color:var(--text-primary); font-family:var(--font);
    -webkit-font-smoothing:antialiased; font-feature-settings:"tnum" 1; transition:background .2s,color .2s; }
  button{ font-family:inherit; }

  .app{ height:100vh; display:flex; flex-direction:column; }

  /* ===== TOPBAR ===== */
  .topbar{ height:var(--topbar-h); flex:none; display:grid; grid-template-columns:1fr auto 1fr;
    align-items:center; gap:16px; padding:0 20px; }
  .tb-left{ justify-self:start; }
  .tb-center{ justify-self:center; }
  .tb-right{ justify-self:end; display:flex; align-items:center; gap:14px; }

  /* logo suelto, con color de marca */
  .logo{ display:flex; align-items:center; gap:11px; }
  .logo .mark{ height:24px; display:flex; color:var(--logo); }
  .logo .mark svg{ height:24px; width:auto; }
  .logo .mark svg path{ fill:currentColor; }
  .logo .wm{ font-weight:600; font-size:16px; letter-spacing:.2em; color:var(--text-primary); }

  /* usuario centro — breadcrumb: avatar / rol / nombre */
  .crumb{ display:flex; align-items:center; gap:14px; }
  .crumb .ava{ width:34px; height:34px; border-radius:50%; overflow:hidden; background:var(--bg-elevated); flex:none; }
  .crumb .ava img{ width:100%; height:100%; object-fit:cover; display:block; }
  .crumb .sep{ color:var(--text-muted); opacity:.45; font-size:20px; font-weight:300; transform:skewX(-12deg); }
  .crumb .ci{ font-size:15px; font-weight:500; color:var(--text-primary); white-space:nowrap; }

  /* switch sol / luna — knob liso que se desliza; 2 iconos fijos, el activo resalta */
  .switch{ border:0; background:none; padding:0; cursor:pointer; }
  .track{ position:relative; display:block; width:72px; height:36px; border-radius:999px;
    background:var(--bg-surface); border:1px solid var(--border); }
  .knob{ position:absolute; top:3px; left:3px; width:30px; height:30px; border-radius:50%;
    background:var(--knob); box-shadow:0 2px 6px rgba(0,0,0,.45); transition:transform .2s ease; z-index:1; }
  :root[data-theme="dark"] .knob{ transform:translateX(36px); }
  :root[data-theme="light"] .knob{ transform:translateX(0); box-shadow:0 2px 6px rgba(0,0,0,.15); }
  .end{ position:absolute; top:50%; transform:translateY(-50%); z-index:2; display:inline-flex; }
  .end-sun{ left:10px; } .end-moon{ right:10px; }
  :root[data-theme="dark"] .end-moon{ color:var(--accent-on-dark); }
  :root[data-theme="dark"] .end-sun{ color:var(--text-muted); opacity:.55; }
  :root[data-theme="light"] .end-sun{ color:var(--accent-on-dark); }
  :root[data-theme="light"] .end-moon{ color:var(--text-muted); opacity:.55; }

  .divider{ width:1px; height:26px; background:var(--hair); }

  /* acciones — iconos planos */
  .actions{ display:flex; align-items:center; gap:4px; }
  .ic-btn{ width:40px; height:40px; border:0; background:none; color:var(--text-muted);
    display:grid; place-items:center; cursor:pointer; border-radius:9px; position:relative; transition:.15s; }
  .ic-btn:hover{ color:var(--text-primary); background:var(--hover); }
  .ic-btn .dot{ position:absolute; top:9px; right:10px; width:7px; height:7px; border-radius:50%;
    background:var(--error); border:2px solid var(--bg-page); }

  /* ===== BODY ===== */
  .body{ flex:1; display:flex; min-height:0; }

  /* rail — solo las opciones (iconos) */
  .rail{ width:var(--rail-w); flex:none;
    display:flex; flex-direction:column; align-items:center; padding:12px 0; gap:6px; }
  .rail-item{ width:44px; height:44px; border:0; background:none; color:var(--text-muted);
    display:grid; place-items:center; cursor:pointer; border-radius:12px; transition:.15s; }
  .rail-item:hover{ background:var(--hover); color:var(--text-primary); }
  .rail-item.active{ background:color-mix(in srgb, var(--accent-on-dark) 15%, transparent); color:var(--accent-on-dark); }
  .rail-logout{ margin-top:auto; }  /* cerrar sesión: al fondo del rail */

  /* contenido — vacío. El borde va AQUÍ (no en header ni rail): así el header+rail
     se leen como un solo bloque y el contenido es un panel inset con esquina redondeada. */
  .content{ flex:1; min-width:0; overflow:auto;
    border-top:1px solid var(--border); border-left:1px solid var(--border);
    border-top-left-radius:18px;
    background-color:var(--bg-page);
    background-image:radial-gradient(circle, var(--dot) 1px, transparent 1px);
    background-size:24px 24px; }

  @media (max-width:760px){ .user .meta{ display:none; } }

  /* ===== BORDES (documentación) =====
     --hair   → divisores finos internos (el divisor entre el switch y las acciones).
                Oscuro rgba(255,255,255,.06) · Claro rgba(0,0,0,.08).
     --border → borde del PANEL DE CONTENIDO (.content). Es el que SEPARA las secciones.
                Oscuro rgba(255,255,255,.22) · Claro rgba(0,0,0,.32). Claramente visible.
     Header (.topbar) y rail (.rail): SIN borde a propósito — se leen como un solo bloque.
     El borde vive solo en el main: border-top + border-left + esquina sup-izq redondeada 18px.
  */
</style>
</head>

      <button class="rail-item"><span data-i="users"></span></button>
      <button class="rail-item"><span data-i="folder"></span></button>
      <button class="rail-item"><span data-i="file-text"></span></button>
      <button class="rail-item"><span data-i="bar-chart-3"></span></button>
      <button class="rail-item"><span data-i="list"></span></button>
      <button class="rail-item rail-logout" aria-label="Cerrar sesión" title="Cerrar sesión"><span data-i="log-out"></span></button>
    </nav>
    <main class="content"></main>
  </div>

  document.querySelectorAll('[data-i]').forEach(el=>{ el.innerHTML=svg(el.dataset.i, el.dataset.s||22); el.style.display='inline-flex'; });

  // switch de tema — un solo interruptor que alterna
  const tt=document.getElementById('themeToggle');
  tt.addEventListener('click',()=>{
    const toLight = document.documentElement.getAttribute('data-theme') !== 'light';
    document.documentElement.setAttribute('data-theme', toLight ? 'light' : 'dark');
    tt.setAttribute('aria-checked', toLight ? 'false' : 'true');
