<!doctype html>
<html lang="es" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>zolug · Layout — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* ===== tokens (de base.html · tema oscuro) ===== */
  :root{
    --bg-page:#0d0c13; --bg-surface:#14121c; --bg-elevated:#1a1922;
    --text-primary:#ffffff; --text-muted:#a2a9ad;
    --accent-solid:#5a58c2; --accent-on-dark:#7474ef; --logo:#955dcd; --error:#df5158;
    /* bordes SUAVES — hairlines de baja opacidad, como Plasma */
    --hair:rgba(255,255,255,.06);
    --border:rgba(255,255,255,.22);
    --dot:rgba(255,255,255,.04);
    --hover:rgba(255,255,255,.04);
    --topbar-h:50px; --rail-w:60px;
    --font:"Inter",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    /* escala tipográfica (de base.html · independiente del tema) */
    --fs-display-xl:32px; --fs-display-l:24px; --fs-heading:20px; --fs-subheading:18px; --fs-body:16px; --fs-label:14px; --fs-caption:14px;
    --fw-regular:400; --fw-medium:500; --fw-semibold:600; --fw-bold:700;
    --lh-tight:1.2; --lh-snug:1.35; --lh-normal:1.5;
    --ls-tight:-0.02em; --ls-snug:-0.01em; --ls-label:0.05em;
  }
  /* tema claro — paleta OFICIAL, sincronizada con base.html (ya no es provisional) */
  :root[data-theme="light"]{
    --bg-page:#f0edf5; --bg-surface:#f8f6fb; --bg-elevated:#ffffff;
    --text-primary:#14121c; --text-muted:#605c6b;
    --accent-solid:#5a58c2; --accent-on-dark:#5a58c2; --error:#c62f38;
    --hair:rgba(0,0,0,.08); --border:rgba(0,0,0,.32);
    --dot:rgba(0,0,0,.05); --hover:rgba(0,0,0,.04);
    --logo:#14121c;
  }
  *{ box-sizing:border-box; }
  html,body{ height:100%; }
  body{ margin:0; background:var(--bg-page); color:var(--text-primary); font-family:var(--font);
    -webkit-font-smoothing:antialiased; font-feature-settings:"tnum" 1; transition:background .2s,color .2s; }
  button{ font-family:inherit; }

  .app{ height:100vh; display:flex; flex-direction:column; }

  /* ===== TOPBAR ===== */
  .topbar{ height:var(--topbar-h); flex:none; display:grid; grid-template-columns:1fr auto 1fr;
    align-items:center; gap:16px; padding:0 20px; }
  .tb-left{ justify-self:start; }
  .tb-center{ justify-self:center; }
  .tb-right{ justify-self:end; display:flex; align-items:center; gap:14px; }

  /* logo suelto, con color de marca */
  .logo{ display:flex; align-items:center; gap:11px; }
  .logo .mark{ height:24px; display:flex; color:var(--logo); }
  .logo .mark svg{ height:24px; width:auto; }
  .logo .mark svg path{ fill:currentColor; }
  .logo .wm{ font-weight:600; font-size:var(--fs-subheading); letter-spacing:.2em; color:var(--text-primary); }

  /* usuario centro — breadcrumb: avatar / rol / nombre */
  .crumb{ display:flex; align-items:center; gap:14px; }
  .crumb .ava{ width:34px; height:34px; border-radius:50%; overflow:hidden; background:var(--bg-elevated); flex:none; }
  .crumb .ava img{ width:100%; height:100%; object-fit:cover; display:block; }
  .crumb .sep{ color:var(--text-muted); opacity:.45; font-size:var(--fs-subheading); font-weight:300; transform:skewX(-12deg); }
  .crumb .ci{ font-size:var(--fs-body); font-weight:500; color:var(--text-primary); white-space:nowrap; }

  /* Switch sol / luna. Los iconos NO se mueven: lo que se desliza es una pastilla de
     acento que se posa detrás del icono activo, y ese icono se invierte a oscuro.
     Antes la perilla era un disco gris que pasaba por DEBAJO del icono fijo y chocaba
     con él; además el gris no pertenecía a la paleta. */
  .switch{ border:0; background:none; padding:0; cursor:pointer; }
  .track{ position:relative; display:block; width:72px; height:36px; border-radius:999px;
    background:var(--bg-surface); border:1px solid var(--border); }
  .knob{ position:absolute; top:2px; left:2px; width:30px; height:30px; border-radius:50%;
    background:var(--accent-on-dark); transition:transform .2s ease; z-index:1; }
  :root[data-theme="dark"] .knob{ transform:translateX(36px); }
  :root[data-theme="light"] .knob{ transform:translateX(0); }
  .end{ position:absolute; top:50%; transform:translateY(-50%); z-index:2; display:inline-flex; }
  .end-sun{ left:9px; } .end-moon{ right:9px; }
  /* icono ACTIVO = sobre la pastilla, en color de fondo. INACTIVO = text-muted pleno. */
  :root[data-theme="dark"] .end-moon{ color:var(--bg-page); }
  :root[data-theme="dark"] .end-sun{ color:var(--text-muted); }
  :root[data-theme="light"] .end-sun{ color:#ffffff; }
  :root[data-theme="light"] .end-moon{ color:var(--text-muted); }

  /* mismo color que el borde del main */
  .divider{ width:1px; height:26px; background:var(--border); }

  /* acciones — iconos planos */
  .actions{ display:flex; align-items:center; gap:4px; }
  .ic-btn{ width:40px; height:40px; border:0; background:none; color:var(--text-muted);
    display:grid; place-items:center; cursor:pointer; border-radius:9px; position:relative; transition:.15s; }
  .ic-btn:hover{ color:var(--text-primary); background:var(--hover); }
  .ic-btn .dot{ position:absolute; top:9px; right:10px; width:7px; height:7px; border-radius:50%;
    background:var(--error); border:2px solid var(--bg-page); }

  /* ===== BODY ===== */
  .body{ flex:1; display:flex; min-height:0; }

  /* rail — solo las opciones (iconos) */
  .rail{ width:var(--rail-w); flex:none;
    display:flex; flex-direction:column; align-items:center; padding:12px 0; gap:6px; }
  .rail-item{ width:44px; height:44px; border:0; background:none; color:var(--text-muted);
    display:grid; place-items:center; cursor:pointer; border-radius:12px; transition:.15s; position:relative; }
  .rail-item:hover{ background:var(--hover); color:var(--text-primary); }
  .rail-item.active{ background:color-mix(in srgb, var(--accent-on-dark) 15%, transparent); color:var(--accent-on-dark); }
  /* BARRA de opción activa — SC 1.4.1 (nivel A): el estado no puede distinguirse SOLO por color.
     El icono activo y el inactivo tienen casi la misma luminancia (1.61:1), muy por debajo del
     3:1 que eximiría. La barra es una diferencia de FORMA (está o no está), no de color.
     Mismo mecanismo que usa la pestaña activa de la referencia (img/hero.webp). */
  .rail-item.active::before{ content:""; position:absolute; left:-8px; top:50%;
    transform:translateY(-50%); width:3px; height:22px; border-radius:0 3px 3px 0;
    background:var(--accent-on-dark); }
  .rail-logout{ margin-top:auto; }  /* cerrar sesión: al fondo del rail */

  /* FOCO — SC 2.4.7 (AA). No había ninguna regla: quien navega con teclado no veía dónde estaba. */
  :where(a,button,[tabindex]):focus-visible{ outline:2px solid var(--accent-on-dark);
    outline-offset:2px; border-radius:10px; }

  /* contenido — vacío. El borde va AQUÍ (no en header ni rail): así el header+rail
     se leen como un solo bloque y el contenido es un panel inset con esquina redondeada. */
  .content{ flex:1; min-width:0; overflow:auto;
    border-top:1px solid var(--border); border-left:1px solid var(--border);
    border-top-left-radius:18px;
    background-color:var(--bg-page);
    background-image:radial-gradient(circle, var(--dot) 1px, transparent 1px);
    background-size:24px 24px; }

  @media (max-width:760px){ .user .meta{ display:none; } }

  /* ===== BORDES (documentación) =====
     --hair   → divisores finos internos (el divisor entre el switch y las acciones).
                Oscuro rgba(255,255,255,.06) · Claro rgba(0,0,0,.08).
     --border → borde del PANEL DE CONTENIDO (.content). Es el que SEPARA las secciones.
                Oscuro rgba(255,255,255,.22) · Claro rgba(0,0,0,.32). Claramente visible.
     Header (.topbar) y rail (.rail): SIN borde a propósito — se leen como un solo bloque.
     El borde vive solo en el main: border-top + border-left + esquina sup-izq redondeada 18px.
  */
  /* ===== CABECERA DE PANTALLA 80px (base.md) ===== */
  .screen-head{ min-height:80px; display:flex; align-items:center; justify-content:space-between; gap:16px;
    padding:16px 32px; border-bottom:1px solid var(--hair); position:sticky; top:0; z-index:5;
    background:var(--bg-page); border-top-left-radius:18px; }
  .sh-left{ display:flex; align-items:center; gap:16px; min-width:0; }
  .sh-divider{ width:1px; height:34px; background:var(--border); flex:none; }
  .sh-back{ width:40px; height:40px; flex:none; display:grid; place-items:center; border-radius:10px;
    border:1px solid var(--border); background:var(--bg-surface); color:var(--text-muted); cursor:pointer; transition:.15s; }
  .sh-back:hover{ background:var(--bg-elevated); color:var(--text-primary); }
  .sh-back svg{ width:18px; height:18px; }
  .sh-titles h1{ margin:0; font-size:var(--fs-display-l); font-weight:var(--fw-bold); letter-spacing:var(--ls-tight); line-height:var(--lh-tight); }
  .sh-desc{ margin-top:3px; font-size:var(--fs-label); color:var(--text-muted); font-variant-numeric:tabular-nums; }
  :where(a,button,[tabindex]):focus-visible{ outline:2px solid var(--accent-on-dark); outline-offset:2px; border-radius:10px; }

  /* ===== Lista de clientes ===== */
  .content{ display:flex; flex-direction:column; overflow:hidden; }
  .cl-wrap{ flex:1; min-height:0; padding:20px 32px 24px; display:flex; }
  .cl-panel{ flex:1; min-height:0; display:flex; flex-direction:column; border:1px solid var(--border);
    border-radius:14px; background:var(--bg-surface); overflow:hidden; }
  .cl-scroll{ flex:1; min-height:0; overflow:auto; }
  .cl-table{ width:100%; border-collapse:collapse; }
  .cl-table thead th{ position:sticky; top:0; background:var(--bg-surface); z-index:1; }
  .cl-table th{ text-align:left; font-size:var(--fs-label); font-weight:var(--fw-semibold); letter-spacing:var(--ls-label);
    text-transform:uppercase; color:var(--text-muted); padding:12px 16px; border-bottom:1px solid var(--border); white-space:nowrap; }
  .cl-table td{ font-size:var(--fs-body); color:var(--text-primary); padding:14px 16px; border-bottom:1px solid var(--hair); vertical-align:middle; }
  .cl-table tbody tr:last-child td{ border-bottom:0; }
  .cl-table tbody tr{ cursor:pointer; transition:background .12s; }
  .cl-table tbody tr:hover{ background:var(--hover); }
  .cl-table tbody tr:focus-visible{ outline:2px solid var(--accent-on-dark); outline-offset:-2px; }
  .cl-name{ font-weight:var(--fw-semibold); }
  .cl-num{ font-variant-numeric:tabular-nums; white-space:nowrap; }
  .cl-doctype{ display:inline-flex; align-items:center; height:22px; padding:0 9px; border-radius:6px;
    background:var(--hover); font-size:var(--fs-label); font-weight:var(--fw-semibold); }
  .cl-chev{ width:1%; text-align:right; color:var(--text-muted); }
  .cl-chev svg{ width:18px; height:18px; }
  .cl-table tbody tr:hover .cl-chev{ color:var(--text-primary); }
  /* paginador (dentro del contenedor, abajo) */
  .cl-pager{ flex:none; display:flex; align-items:center; justify-content:space-between; gap:16px;
    padding:12px 20px; border-top:1px solid var(--hair); font-size:var(--fs-label); color:var(--text-muted); font-variant-numeric:tabular-nums; }
  .cl-pager-left{ display:flex; align-items:center; gap:18px; }
  .cl-rpp{ display:inline-flex; align-items:center; gap:8px; color:var(--text-muted); white-space:nowrap; }
  .cl-rpp select{ height:32px; border:1px solid var(--border); border-radius:8px; background:var(--bg-surface);
    color:var(--text-primary); font:inherit; font-size:var(--fs-label); padding:0 8px; cursor:pointer; }
  .cl-pager-ctrl{ display:flex; align-items:center; gap:4px; }
  .cl-pgbtn{ min-width:34px; height:34px; padding:0 6px; display:inline-grid; place-items:center; border-radius:8px; border:1px solid var(--border);
    background:var(--bg-surface); color:var(--text-primary); font:inherit; font-size:var(--fs-label); font-weight:var(--fw-medium);
    font-variant-numeric:tabular-nums; cursor:pointer; transition:.15s; }
  .cl-pgbtn:hover:not(:disabled):not(.on){ background:var(--bg-elevated); }
  .cl-pgbtn:disabled{ opacity:.4; cursor:default; }
  .cl-pgbtn.on{ background:var(--accent-solid); border-color:transparent; color:#fff; cursor:default; }
  .cl-pgbtn svg{ width:16px; height:16px; }
  .cl-pg-ell{ min-width:22px; text-align:center; color:var(--text-muted); }
  /* buscador: selector (nombre/cédula/teléfono) + input */
  .cl-search{ display:flex; align-items:center; height:40px; border:1px solid var(--border); border-radius:10px; background:var(--bg-surface); }
  .cl-search:focus-within{ border-color:var(--accent-on-dark); }
  .cl-search-sel{ height:100%; border:0; background:var(--bg-elevated); color:var(--text-primary); font:inherit; font-size:var(--fs-label);
    font-weight:var(--fw-medium); padding:0 12px; cursor:pointer; border-right:1px solid var(--border); border-radius:9px 0 0 9px; }
  .cl-search-ic{ display:inline-flex; color:var(--text-muted); padding-left:12px; }
  .cl-search-ic svg{ width:16px; height:16px; }
  .cl-search-inp{ height:100%; border:0; background:none; color:var(--text-primary); font:inherit; font-size:var(--fs-body); padding:0 14px 0 8px; min-width:220px; }
  .cl-search-inp:focus-visible, .cl-search-sel:focus-visible{ outline:none; }
  @media (max-width:760px){
    .screen-head{ flex-wrap:wrap; align-items:flex-start; }
    .sh-actions{ width:100%; } .cl-search{ width:100%; } .cl-search-inp{ flex:1; min-width:0; }
    .cl-wrap{ padding:12px 16px 16px; }
  }
  .cl-skel span{ display:block; height:12px; border-radius:6px; background:var(--hover); animation:clShim 1.2s ease-in-out infinite; }
  @keyframes clShim{ 0%,100%{opacity:.5} 50%{opacity:1} }
  .cl-empty{ padding:56px 16px; text-align:center; color:var(--text-muted); font-size:var(--fs-body); }
  .cl-empty b{ display:block; color:var(--text-primary); margin-bottom:4px; }
  @media (prefers-reduced-motion:reduce){ .cl-skel span{ animation:none !important; } }
  @media (max-width:640px){ .screen-head{ padding:16px 20px; } }
  @media (max-width:820px){
    .cl-wrap{ padding:16px; }
    .cl-table thead{ position:absolute; width:1px; height:1px; overflow:hidden; clip:rect(0 0 0 0); }
    .cl-table, .cl-table tbody, .cl-table tr, .cl-table td{ display:block; width:100%; }
    .cl-table tbody tr{ padding:12px 6px; border-bottom:1px solid var(--border); }
    .cl-table td{ display:grid; grid-template-columns:44% 1fr; gap:10px; padding:5px 0; border:0; align-items:center; }
    .cl-table td::before{ content:attr(data-label); color:var(--text-muted); font-size:var(--fs-label); font-weight:var(--fw-medium); }
    .cl-table td.cl-chev{ display:none; }
  }
</style>
</head>
<body>
<div class="app">

  const ICONS = {
    "chevron-down":'<path d="m6 9 6 6 6-6"/>',
    "bell":'<path d="M10.268 21a2 2 0 0 0 3.464 0"/><path d="M3.262 15.326A1 1 0 0 0 4 17h16a1 1 0 0 0 .74-1.673C19.41 13.956 18 12.499 18 8A6 6 0 0 0 6 8c0 4.499-1.411 5.956-2.738 7.326"/>',
    "message-square":'<path d="M22 17a2 2 0 0 1-2 2H6.828a2 2 0 0 0-1.414.586l-2.202 2.202A.71.71 0 0 1 2 21.286V5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2z"/>',
    "sun":'<circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/>',
    "moon":'<path d="M20.985 12.486a9 9 0 1 1-9.473-9.472c.405-.022.617.46.402.803a6 6 0 0 0 8.268 8.268c.344-.215.825-.004.803.401"/>',
    "layout-dashboard":'<rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/>',
    "users":'<path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><path d="M16 3.128a4 4 0 0 1 0 7.744"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><circle cx="9" cy="7" r="4"/>',
    "folder":'<path d="M20 20a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.9a2 2 0 0 1-1.69-.9L9.6 3.9A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2Z"/>',
    "file-text":'<path d="M6 22a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h8a2.4 2.4 0 0 1 1.704.706l3.588 3.588A2.4 2.4 0 0 1 20 8v12a2 2 0 0 1-2 2z"/><path d="M14 2v5a1 1 0 0 0 1 1h5"/><path d="M10 9H8"/><path d="M16 13H8"/><path d="M16 17H8"/>',
    "bar-chart-3":'<path d="M3 3v16a2 2 0 0 0 2 2h16"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/>',
    "list":'<path d="M3 5h.01"/><path d="M3 12h.01"/><path d="M3 19h.01"/><path d="M8 5h13"/><path d="M8 12h13"/><path d="M8 19h13"/>',
    "log-out":'<path d="m16 17 5-5-5-5"/><path d="M21 12H9"/><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>',
    "arrow-left":'<path d="m12 19-7-7 7-7"/><path d="M19 12H5"/>',
    "chevron-right":'<path d="m9 18 6-6-6-6"/>',
    "chevron-left":'<path d="m15 18-6-6 6-6"/>',
    "search":'<path d="m21 21-4.34-4.34"/><circle cx="11" cy="11" r="8"/>'
  };
  function svg(n,s){ return '<svg xmlns="http://www.w3.org/2000/svg" width="'+s+'" height="'+s+'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">'+(ICONS[n]||'')+'</svg>'; }
  document.querySelectorAll('[data-i]').forEach(el=>{ el.innerHTML=svg(el.dataset.i, el.dataset.s||22); el.style.display='inline-flex'; });

  // switch de tema — un solo interruptor que alterna
  const tt=document.getElementById('themeToggle');
  tt.addEventListener('click',()=>{
    const toLight = document.documentElement.getAttribute('data-theme') !== 'light';
    document.documentElement.setAttribute('data-theme', toLight ? 'light' : 'dark');
    tt.setAttribute('aria-checked', toLight ? 'false' : 'true');
  });
  // rail activo
  document.getElementById('rail').addEventListener('click',e=>{ const it=e.target.closest('.rail-item'); if(!it)return;
    if(it.classList.contains('rail-logout'))return;
    document.querySelectorAll('#rail .rail-item').forEach(x=>{ x.classList.remove('active'); x.removeAttribute('aria-current'); });
    it.classList.add('active'); it.setAttribute('aria-current','page'); });

  // ===== Lista de clientes =====
  // Datos de MUESTRA (fixture del prototipo). Columnas fieles al pedido: tipo doc, número doc, nombre, teléfono principal.
  const CLIENTS = [
    { dt:'CC', dn:'43.256.789', name:'Marta Lucía Restrepo Ossa',   phone:'310 456 7890' },
    { dt:'CC', dn:'71.234.567', name:'Carlos Andrés Mejía Vélez',   phone:'300 123 4567' },
    { dt:'CC', dn:'24.876.543', name:'Luz Dary Ospina Cardona',     phone:'312 998 7766' },
    { dt:'CE', dn:'345.221',    name:'Sandra Milena Cardona Ruiz',  phone:'318 002 3344' },
    { dt:'CC', dn:'98.765.432', name:'Jorge Iván Betancur Ríos',    phone:'315 445 2211' },
    { dt:'CC', dn:'52.119.884', name:'Diana Marcela Ríos Gómez',    phone:'320 776 5544' },
    { dt:'PA', dn:'X1234567',   name:'Héctor Fabio Loaiza Muñoz',   phone:'311 234 9090' },
    { dt:'CC', dn:'16.884.077', name:'Óscar Eduardo Marín Salazar', phone:'301 556 8899' },
    { dt:'CC', dn:'12.345.678', name:'Ana María Gómez Restrepo',    phone:'300 111 2233' },
    { dt:'CC', dn:'79.456.123', name:'Julián Ospina Ramírez',       phone:'311 222 3344' },
    { dt:'CE', dn:'998.112',    name:'Paola Andrea Ruiz León',      phone:'320 333 4455' },
    { dt:'CC', dn:'43.998.221', name:'Gloria Stella Mesa Álzate',   phone:'315 444 5566' },
    { dt:'CC', dn:'10.223.998', name:'Fernando Quintero Álvarez',   phone:'301 555 6677' },
    { dt:'PA', dn:'C0987654',   name:'Mónica Liliana Vargas Peña',  phone:'318 666 7788' },
    { dt:'CC', dn:'66.112.554', name:'Andrés Felipe Cano Muñoz',    phone:'312 777 8899' },
    { dt:'CC', dn:'24.665.331', name:'Beatriz Elena Duque Ríos',    phone:'300 888 9900' },
    { dt:'CC', dn:'71.998.442', name:'Ricardo León Zapata Mora',    phone:'319 999 0011' },
    { dt:'CE', dn:'552.339',    name:'Camilo Ernesto Salas Bedoya', phone:'316 121 2323' },
    { dt:'CC', dn:'52.667.881', name:'Yolanda Patricia Cifuentes',  phone:'314 343 4545' },
    { dt:'CC', dn:'16.223.774', name:'Sebastián Arango Villa',      phone:'302 565 6767' }
  ];
  const escc = s => String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
  const clBody=document.getElementById('clBody'), clCount=document.getElementById('clCount'),
        clField=document.getElementById('clField'), clQuery=document.getElementById('clQuery'),
        clInfo=document.getElementById('clInfo'), clPages=document.getElementById('clPages'), clRpp=document.getElementById('clRpp');
  let clPage=1, clSize=8;
  const norm=s=>String(s==null?'':s).toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'');
  const digits=s=>String(s==null?'':s).replace(/\D/g,'');
  function clFiltered(){ const f=clField.value, q=clQuery.value.trim(); if(!q) return CLIENTS;
    return CLIENTS.filter(c=> f==='name' ? norm(c.name).includes(norm(q))
      : (digits(c[f]).includes(digits(q)) || norm(c[f]).includes(norm(q))) ); }

  function pageWindow(cur,pages){ const out=[];
    if(pages<=7){ for(let i=1;i<=pages;i++) out.push(i); return out; }
    out.push(1); if(cur>4) out.push('…');
    for(let i=Math.max(2,cur-1);i<=Math.min(pages-1,cur+1);i++) out.push(i);
    if(cur<pages-3) out.push('…'); out.push(pages); return out; }

  function renderPager(cur,pages){
    let h='<button class="cl-pgbtn" data-pg="'+(cur-1)+'" aria-label="Anterior"'+(cur<=1?' disabled':'')+'><span data-i="chevron-left"></span></button>';
    pageWindow(cur,pages).forEach(p=>{
      if(p==='…') h+='<span class="cl-pg-ell">…</span>';
      else if(p===cur) h+='<button class="cl-pgbtn on" aria-current="page">'+p+'</button>';
      else h+='<button class="cl-pgbtn" data-pg="'+p+'" aria-label="Página '+p+'">'+p+'</button>';
    });
    h+='<button class="cl-pgbtn" data-pg="'+(cur+1)+'" aria-label="Siguiente"'+(cur>=pages?' disabled':'')+'><span data-i="chevron-right"></span></button>';
    clPages.innerHTML=h;
    clPages.querySelectorAll('[data-i]').forEach(el=>{ el.innerHTML=svg(el.dataset.i,16); el.style.display='inline-flex'; });
  }

  function clRender(){
    const list=clFiltered(), total=list.length, pages=Math.max(1, Math.ceil(total/clSize));
    if(clPage>pages) clPage=pages; if(clPage<1) clPage=1;
    const start=(clPage-1)*clSize, slice=list.slice(start, start+clSize);
    if(!total){
      clBody.innerHTML='<tr><td colspan="5"><div class="cl-empty"><b>Sin resultados</b>Ningún cliente coincide con la búsqueda.</div></td></tr>';
    } else {
      clBody.innerHTML = slice.map(c=>'<tr tabindex="0" data-href="client_detali.html" aria-label="Abrir '+escc(c.name)+'">'
        +'<td data-label="Tipo de documento"><span class="cl-doctype">'+escc(c.dt)+'</span></td>'
        +'<td data-label="Número de documento" class="cl-num">'+escc(c.dn)+'</td>'
        +'<td data-label="Nombre" class="cl-name">'+escc(c.name)+'</td>'
        +'<td data-label="Teléfono principal" class="cl-num">'+escc(c.phone)+'</td>'
        +'<td class="cl-chev"><span data-i="chevron-right"></span></td></tr>').join('');
      clBody.querySelectorAll('[data-i]').forEach(el=>{ el.innerHTML=svg(el.dataset.i,18); el.style.display='inline-flex'; });
    }
    const nAll=CLIENTS.length; clCount.textContent=nAll+(nAll===1?' cliente':' clientes');
    const a=total?start+1:0, b=Math.min(start+clSize,total);
    clInfo.textContent='Mostrando '+a+'–'+b+' de '+total;
    renderPager(clPage, pages);
  }
  function clSkeleton(){
    clBody.innerHTML=Array.from({length:8}).map(()=>'<tr class="cl-skel"><td><span style="width:46px"></span></td><td><span style="width:60%"></span></td><td><span style="width:82%"></span></td><td><span style="width:55%"></span></td><td></td></tr>').join('');
  }
  clBody.addEventListener('click', e=>{ const tr=e.target.closest('tr[data-href]'); if(tr) location.href=tr.dataset.href; });
  clBody.addEventListener('keydown', e=>{ if(e.key==='Enter'){ const tr=e.target.closest('tr[data-href]'); if(tr) location.href=tr.dataset.href; } });
  clField.addEventListener('change', ()=>{ clPage=1; clRender(); });
  clQuery.addEventListener('input', ()=>{ clPage=1; clRender(); });
  clRpp.addEventListener('change', ()=>{ clSize=+clRpp.value; clPage=1; clRender(); });
  clPages.addEventListener('click', e=>{ const b=e.target.closest('button[data-pg]'); if(!b||b.disabled) return; clPage=+b.dataset.pg; clRender(); });
  if(matchMedia('(prefers-reduced-motion:reduce)').matches){ clRender(); } else { clSkeleton(); setTimeout(clRender, 400); }
</script>
</body>
</html>
