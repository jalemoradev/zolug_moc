<title>Zolug · Clientes — Detalle Propuesta C · Franjas horizontales</title>
<!--
  ==========================================================================================
  ZOLUG · MÓDULO DE CLIENTES — DETALLE, PROPUESTA C: "FRANJAS HORIZONTALES (hoja de especificaciones)"
  ------------------------------------------------------------------------------------------
  Dirección de diseño:
    Bajo el resumen horizontal, cada sección es una FRANJA full-width tipo hoja de
    especificaciones / registro premium. A la IZQUIERDA una etiqueta (icono + título en
    small-caps); a la DERECHA los datos esenciales en UNA línea horizontal por ítem
    (label small-caps inline + valor, 12-13px). Separación por hairline y zebra MUY sutil
    (var(--dot)) para diferenciar franjas SIN que parezcan cards.

  PULIDO (2026-07-18 · nivel empresarial):
    · Fuera "Plantilla" y "Carga masiva" del header de la lista: el módulo de clientes ya no
      maneja masivos ni plantilla.
    · Header interno: iconos agrupados por dominio (financiero · contacto/ubicación · patrimonio ·
      laboral/salud) con separadores hairline; hover/focus de un icono ILUMINA su franja
      (refuerza el mapa icono→sección); el icono queda marcado mientras su drawer está abierto.
    · Franjas: icono plano sin chip tintado (el acento queda reservado a roles/estados) y hairline
      vertical entre la etiqueta y los datos (lectura de ficha técnica / ledger).
    · Resumen: edad calculada junto al documento (verificación de identidad en llamada).
    · Motion: entrada sutil del detalle y drawer con ease-out-expo (.28s); reduced-motion intacto.
    · Contacto DIVIDIDO en dos secciones/franjas/drawers independientes: Teléfonos (icono phone)
      y Correos (icono mail). Cada uno cuenta y edita por separado.
    · CREAR REGISTROS desde el drawer: botón «Agregar …» (ADDERS) inserta un bloque editable vacío
      marcado "Nuevo". Habilitado solo donde el asesor captura en gestión: teléfonos, correos,
      residencia anterior, propiedades, vehículos, laboral. Créditos (vienen del banco), jurídico
      (modelo provisional) y salud (afiliación única) NO exponen adder.
    · Inputs del drawer con atributo name (slug de la etiqueta) — sin avisos de form-field.
    · Archivos de exploración eliminados: solo queda esta propuesta C para subir a GitHub.

  CAMBIOS de esta iteración (operación de call center · CERO scroll):
    · TODO el cliente cabe en UNA pantalla (1440×900 y 1366×768): barra interna + banda de
      resumen compacta + las 8 franjas condensadas reparten la altura restante con flex.
      El contenedor del detalle NO genera scroll vertical.
    · Los ICONOS del header interno (con tooltip accesible) son la ÚNICA puerta al DRAWER de
      cada sección: clic en icono → drawer con la ficha COMPLETA + formulario editable.
      Se eliminan los botones "Editar" de las franjas; el cuerpo es solo lectura resumida.
    · NADA de cards/cajas: el profesionalismo viene de tipografía, jerarquía, espacio y
      divisores finos.
    · RESUMEN HORIZONTAL arriba (banda): avatar/inicial + nombre + cédula + correo y teléfono
      actuales + ciudad + conteos (Créditos con Titular/Codeudor, Procesos con Demandante/
      Demandado). Sin cards, separadores finos.

  REGLAS DURAS aplicadas:
    · Sin Gestiones ni Abonos (el dataset los trae pero la vista los IGNORA). Sin botones de
      copiar/llamar. Sin "saldo total" agregado, sin "días de mora", sin "estado" en créditos
      (solo el saldo PROPIO de cada crédito). Edición SOLO vía drawer (iconos del header).

  Baseline de plataforma web (features no triviales usadas):
    · color-mix()            → Newly available  → protegido con @supports + fallback rgba().
    · 100dvh                 → Newly available  → fallback 100vh declarado antes.
    · :focus-visible         → Widely available → sin fallback necesario.
    · flex gap / grid        → Widely available → sin fallback necesario.
    · prefers-reduced-motion → Widely available → desactiva transiciones/animaciones.

  BASE DE DISEÑO (design system zolug_moc, ver ../../base.html):
    tokens + ambos temas + switch sol/luna · shell (topbar + rail + panel) · VISTA DE LISTA ·
    navegación lista↔detalle · dataset CLIENTS (Marta Lucía Restrepo Ossa precargada) · set de
    iconos · fuente Inter (token de marca, NO se cambia) · COMPONENTE DRAWER (formularios por
    sección + mecánica: overlay, Esc, foco atrapado, animación). Paleta Plasma alineada a base.html
    (accent #5a58c2 / on #7474ef / logo #955dcd / error #df5158 AA).
  Autocontenido · tnum · accesible (foco visible, tooltips accesibles, drawer role=dialog +
  aria-modal + Esc) · sin librerías externas · sin scroll horizontal · solo tokens ·
  transiciones sobrias · respeta prefers-reduced-motion.
  ==========================================================================================
-->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
  /* ===== TOKENS (idénticos al base · tema oscuro) ===== */
  :root{
    --bg-page:#0d0c13; --bg-surface:#14121c; --bg-elevated:#1a1922;
    --border-subtle:#201e2a; --border-default:#2a2740;
    --text-primary:#ffffff; --text-muted:#a2a9ad;
    --accent-solid:#5a58c2; --accent-on:#7474ef; --logo:#955dcd; --error:#df5158;
    --hair:rgba(255,255,255,.06); --border:rgba(255,255,255,.22);
    --dot:rgba(255,255,255,.04); --hover:rgba(255,255,255,.04);
    --ok:#3fb27f; --ok-bg:rgba(63,178,127,.12);
    --warn:#d9a441; --warn-bg:rgba(217,164,65,.12);
    --danger:#df5158; --danger-bg:rgba(223,81,88,.12);
    --info:#7474ef; --info-bg:rgba(116,116,239,.12);
    --neutral:#a2a9ad; --neutral-bg:rgba(162,169,173,.10);
    --accent-tint:rgba(116,116,239,.12);
    --hl:rgba(116,116,239,.07);
    --topbar-h:50px; --rail-w:60px; --knob:#2a2740;
    --radius-card:12px; --radius-panel:16px;
    --font:"Inter",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  }
  :root[data-theme="light"]{
    --bg-page:#f0edf5; --bg-surface:#f8f6fb; --bg-elevated:#ffffff;
    --border-subtle:#e5e1ec; --border-default:#d8d3e2;
    --text-primary:#14121c; --text-muted:#605c6b;
    --accent-on:#5a58c2;
    --hair:rgba(0,0,0,.08); --border:rgba(0,0,0,.32);
    --dot:rgba(0,0,0,.035); --hover:rgba(0,0,0,.04); --knob:#ffffff; --logo:#14121c;
    --ok:#1f9d63; --ok-bg:rgba(31,157,99,.10);
    --warn:#b7841f; --warn-bg:rgba(183,132,31,.12);
    --danger:#c62f38; --danger-bg:rgba(198,47,56,.10);
    --info:#5a58c2; --info-bg:rgba(90,88,194,.10);
    --neutral:#605c6b; --neutral-bg:rgba(96,92,107,.10);
    --accent-tint:rgba(90,88,194,.10);
    --hl:rgba(90,88,194,.06);
  }

  *{ box-sizing:border-box; }
  html,body{ height:100%; }
  body{ margin:0; background:var(--bg-page); color:var(--text-primary); font-family:var(--font);
    -webkit-font-smoothing:antialiased; font-feature-settings:"tnum" 1; letter-spacing:-0.005em;
    transition:background .2s,color .2s; }
  button,input,select{ font-family:inherit; }
  ::selection{ background:rgba(116,116,239,.32); }
  @supports (background:color-mix(in srgb,red,blue)){
    ::selection{ background:color-mix(in srgb,var(--accent-on) 32%,transparent); }
  }
  .num,.tnum{ font-variant-numeric:tabular-nums; font-feature-settings:"tnum" 1; }
  :focus-visible{ outline:2px solid var(--accent-on); outline-offset:2px; border-radius:6px; }
  .app{ height:100vh; height:100dvh; display:flex; flex-direction:column; overflow:hidden; }

  /* ===== TOPBAR (idéntico al base) ===== */
  .topbar{ height:var(--topbar-h); flex:none; display:grid; grid-template-columns:1fr auto 1fr;
    align-items:center; gap:16px; padding:0 20px; }
  .tb-left{ justify-self:start; } .tb-center{ justify-self:center; }
  .tb-right{ justify-self:end; display:flex; align-items:center; gap:14px; }
  .logo{ display:flex; align-items:center; gap:11px; }
  .logo .mark{ height:24px; display:flex; color:var(--logo); }
  .logo .mark svg{ height:24px; width:auto; } .logo .mark svg path{ fill:currentColor; }
  .logo .wm{ font-weight:600; font-size:16px; letter-spacing:.2em; color:var(--text-primary); }
  .crumb{ display:flex; align-items:center; gap:12px; }
  .crumb .ava{ width:30px; height:30px; border-radius:50%; background:var(--accent-solid);
    color:#fff; flex:none; display:grid; place-items:center; font-size:12px; font-weight:600; }
  .crumb .sep{ color:var(--text-muted); opacity:.45; font-size:20px; font-weight:300; transform:skewX(-12deg); }
  .crumb .ci{ font-size:14px; font-weight:500; color:var(--text-primary); white-space:nowrap; }
  .crumb .ci.muted{ color:var(--text-muted); }
  .switch{ border:0; background:none; padding:0; cursor:pointer; }
  .track{ position:relative; display:block; width:72px; height:36px; border-radius:999px;
    background:var(--bg-surface); border:1px solid var(--border); }
  .knob{ position:absolute; top:3px; left:3px; width:30px; height:30px; border-radius:50%;
    background:var(--knob); box-shadow:0 2px 6px rgba(0,0,0,.45); transition:transform .2s ease; z-index:1; }
  :root[data-theme="dark"] .knob{ transform:translateX(36px); }
  :root[data-theme="light"] .knob{ transform:translateX(0); box-shadow:0 2px 6px rgba(0,0,0,.15); }
  .end{ position:absolute; top:50%; transform:translateY(-50%); z-index:2; display:inline-flex; }
  .end-sun{ left:10px; } .end-moon{ right:10px; }
  :root[data-theme="dark"] .end-moon{ color:var(--accent-on); }
  :root[data-theme="dark"] .end-sun{ color:var(--text-muted); opacity:.55; }
  :root[data-theme="light"] .end-sun{ color:var(--accent-on); }
  :root[data-theme="light"] .end-moon{ color:var(--text-muted); opacity:.55; }
  .divider{ width:1px; height:26px; background:var(--hair); }
  .actions{ display:flex; align-items:center; gap:4px; }
  .ic-btn{ width:40px; height:40px; border:0; background:none; color:var(--text-muted);
    display:grid; place-items:center; cursor:pointer; border-radius:9px; position:relative; transition:.15s; }
  .ic-btn:hover{ color:var(--text-primary); background:var(--hover); }
  .ic-btn .dot{ position:absolute; top:9px; right:10px; width:7px; height:7px; border-radius:50%;
    background:var(--error); border:2px solid var(--bg-page); }

  /* ===== BODY / RAIL / CONTENT (idéntico al base) ===== */
  .body{ flex:1; display:flex; min-height:0; }
  .rail{ width:var(--rail-w); flex:none; display:flex; flex-direction:column; align-items:center;
    padding:12px 0; gap:6px; }
  .rail-item{ width:44px; height:44px; border:0; background:none; color:var(--text-muted);
    display:grid; place-items:center; cursor:pointer; border-radius:12px; transition:.15s; }
  .rail-item:hover{ background:var(--hover); color:var(--text-primary); }
  .rail-item.active{ background:rgba(116,116,239,.15); color:var(--accent-on); }
  @supports (background:color-mix(in srgb,red,blue)){
    .rail-item.active{ background:color-mix(in srgb,var(--accent-on) 15%,transparent); }
  }
  .rail-logout{ margin-top:auto; }
  .content{ flex:1; min-width:0; overflow:auto;
    border-top:1px solid var(--border); border-left:1px solid var(--border);
    border-top-left-radius:18px; background-color:var(--bg-surface); }

  /* ===== MODULE HEADER (lista · idéntico al base) ===== */
  .mod-head{ padding:22px 26px 0; }
  .mod-title-row{ display:flex; align-items:flex-end; justify-content:space-between; gap:20px; flex-wrap:wrap; }
  .mod-title{ display:flex; align-items:baseline; gap:14px; }
  .mod-title h1{ margin:0; font-size:22px; font-weight:600; letter-spacing:-0.02em; }
  .mod-count{ font-size:13px; color:var(--text-muted); }
  .mod-count b{ color:var(--text-primary); font-weight:600; }
  .head-actions{ display:flex; align-items:center; gap:8px; }
  .btn{ height:36px; padding:0 14px; border-radius:9px; border:1px solid var(--border-default);
    background:var(--bg-elevated); color:var(--text-primary); font-size:13px; font-weight:500;
    display:inline-flex; align-items:center; gap:7px; cursor:pointer; transition:.15s; white-space:nowrap; }
  .btn:hover{ border-color:var(--border); background:var(--hover); }
  .btn svg{ flex:none; opacity:.9; }
  .btn.primary,.btn.btn-primary{ background:var(--accent-solid); border-color:var(--accent-solid); color:#fff; }
  .btn.primary:hover,.btn.btn-primary:hover{ filter:brightness(1.08); }
  .btn.btn-ghost{ background:var(--bg-page); }
  .btn.btn-icon-only{ width:36px; padding:0; justify-content:center; }
  .mod-tools{ display:flex; align-items:center; gap:12px; margin-top:18px; flex-wrap:wrap; }
  .search{ position:relative; flex:1; min-width:280px; max-width:520px; }
  .search .ic{ position:absolute; left:12px; top:50%; transform:translateY(-50%); color:var(--text-muted);
    display:inline-flex; pointer-events:none; }
  .search input{ width:100%; height:38px; padding:0 12px 0 38px; border-radius:10px;
    border:1px solid var(--border-default); background:var(--bg-page); color:var(--text-primary);
    font-size:13.5px; outline:none; transition:.15s; }
  .search input::placeholder{ color:var(--text-muted); }
  .search input:focus{ border-color:var(--accent-on); }
  .filter-wrap{ position:relative; }
  .menu{ position:absolute; top:calc(100% + 6px); left:0; z-index:20; min-width:200px; padding:6px;
    background:var(--bg-elevated); border:1px solid var(--border-default); border-radius:12px;
    box-shadow:0 12px 32px rgba(0,0,0,.35); display:none; }
  .menu.open{ display:block; }
  .menu-lbl{ font-size:11px; letter-spacing:.06em; text-transform:uppercase; color:var(--text-muted);
    padding:6px 10px 4px; }
  .menu button{ width:100%; display:flex; align-items:center; gap:9px; padding:8px 10px; border:0; border-radius:8px;
    background:none; color:var(--text-primary); font-size:13px; cursor:pointer; text-align:left; transition:.12s; }
  .menu button:hover{ background:var(--hover); }
  .menu button[aria-checked="true"]{ color:var(--accent-on); font-weight:500; }
  .menu button .chk{ margin-left:auto; opacity:0; }
  .menu button[aria-checked="true"] .chk{ opacity:1; }

  /* ===== TABLA DENSA (lista · idéntica al base) ===== */
  .table-wrap{ padding:16px 26px 28px; }
  .tbl-card{ background:var(--bg-elevated); border:1px solid var(--border-subtle);
    border-radius:var(--radius-card); overflow:hidden; }
  table{ width:100%; border-collapse:collapse; font-size:13px; }
  thead th{ position:sticky; top:0; z-index:2; background:var(--bg-elevated);
    text-align:left; font-size:10.5px; font-weight:600; letter-spacing:.05em; text-transform:uppercase;
    color:var(--text-muted); padding:11px 14px; border-bottom:1px solid var(--border-default); white-space:nowrap; }
  tbody tr{ cursor:pointer; transition:background .12s; border-bottom:1px solid var(--hair); }
  tbody tr:last-child{ border-bottom:0; }
  tbody tr:nth-child(even){ background:var(--dot); }
  tbody tr:hover{ background:var(--hover); }
  tbody td{ padding:0 14px; height:44px; vertical-align:middle; }
  .cell-client{ display:flex; align-items:center; gap:11px; }
  .cc-ava{ width:30px; height:30px; border-radius:8px; flex:none; display:grid; place-items:center;
    font-size:12px; font-weight:600; background:var(--accent-solid); color:#fff; }
  .cc-txt{ display:flex; flex-direction:column; line-height:1.25; min-width:0; }
  .cc-name{ font-weight:500; font-size:13.5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .cc-doc{ font-size:11.5px; color:var(--text-muted); }
  .muted{ color:var(--text-muted); }
  .lbadge{ display:inline-flex; align-items:center; gap:6px; padding:2px 8px; border-radius:7px;
    background:var(--bg-page); border:1px solid var(--border-subtle); font-size:12px; font-weight:500; }
  .lbadge .lrole{ font-size:10.5px; font-weight:600; }
  .lrole.tit{ color:var(--accent-on); } .lrole.cod{ color:var(--text-muted); }
  .row-more{ width:30px; height:30px; border-radius:7px; border:0; background:transparent; color:var(--text-muted);
    display:grid; place-items:center; cursor:pointer; transition:.15s; }
  tbody tr:hover .row-more{ color:var(--text-primary); }
  .row-more:hover{ background:var(--border-subtle); }
  td.r{ text-align:right; }

  /* ===== VISTAS: lista / detalle ===== */
  .list-view.hide{ display:none; }
  .detail-view{ display:none; height:100%; }
  .detail-view.show{ display:flex; flex-direction:column; }
  .detail-inner{ width:100%; flex:1; min-height:0; }

  /* =========================================================================================
     DETALLE — PROPUESTA C · FRANJAS HORIZONTALES CONDENSADAS (una pantalla · sin scroll)
     ========================================================================================= */
  .dp{ --pad:clamp(18px,3vw,40px); height:100%; display:flex; flex-direction:column; overflow:hidden; }
  @keyframes dpIn{ from{ opacity:0; transform:translateY(4px); } }
  .detail-view.show .dp{ animation:dpIn .24s cubic-bezier(.16,1,.3,1); }

  /* ---------- Barra superior: volver + iconos que ABREN el drawer de cada sección ---------- */
  .dp-bar{ flex:none; display:flex; align-items:center; gap:14px;
    padding:7px var(--pad); background:var(--bg-surface); border-bottom:1px solid var(--hair); }
  .dp-bar-title{ font-size:11px; font-weight:600; color:var(--text-muted); letter-spacing:.09em;
    text-transform:uppercase; }
  .dp-nav{ margin-left:auto; display:flex; align-items:center; gap:2px; }
  .dp-navsep{ width:1px; height:18px; background:var(--hair); margin:0 5px; flex:none; }
  .dp-navbtn{ position:relative; width:36px; height:36px; border:0; background:none; color:var(--text-muted);
    display:grid; place-items:center; cursor:pointer; border-radius:9px; transition:.15s; }
  .dp-navbtn:hover{ color:var(--accent-on); background:var(--hover); }
  .dp-navbtn.open{ color:var(--accent-on); background:var(--accent-tint); }
  .dp-navbtn::after{ content:attr(data-tip); position:absolute; top:calc(100% + 8px); left:50%;
    transform:translateX(-50%) translateY(-3px); padding:5px 9px; border-radius:7px;
    background:var(--bg-elevated); border:1px solid var(--border-default); color:var(--text-primary);
    font-size:11.5px; font-weight:500; white-space:nowrap; letter-spacing:-.01em;
    box-shadow:0 8px 20px rgba(0,0,0,.30); opacity:0; pointer-events:none;
    transition:opacity .15s ease, transform .15s ease; z-index:30; }
  .dp-navbtn:hover::after,.dp-navbtn:focus-visible::after{ opacity:1; transform:translateX(-50%) translateY(0); }

  /* ---------- RESUMEN HORIZONTAL (banda compacta · sin cards) ---------- */
  .dp-summary{ flex:none; display:flex; align-items:center; gap:clamp(14px,2.2vw,30px); flex-wrap:wrap;
    padding:12px var(--pad); border-bottom:1px solid var(--hair); }
  .dp-sum-id{ display:flex; align-items:center; gap:13px; }
  .dp-sum-ava{ width:44px; height:44px; flex:none; border-radius:14px; display:grid; place-items:center;
    font-size:17px; font-weight:600; letter-spacing:-.01em; color:#fff; background:var(--accent-solid);
    box-shadow:0 6px 16px rgba(90,88,194,.26); }
  .dp-sum-name{ margin:0; font-size:16px; font-weight:600; letter-spacing:-.02em; line-height:1.2; }
  .dp-sum-doc{ margin-top:2px; font-size:12px; color:var(--text-muted); }
  .dp-vr{ width:1px; align-self:stretch; min-height:34px; background:var(--hair); flex:none; }
  .dp-sum-facts{ display:flex; align-items:flex-start; gap:clamp(14px,1.8vw,28px); flex-wrap:wrap; }
  .dp-fact{ display:flex; flex-direction:column; gap:3px; min-width:0; }
  .dp-fact-k{ font-size:10px; font-weight:600; letter-spacing:.07em; text-transform:uppercase; color:var(--text-muted); }
  .dp-fact-v{ font-size:13px; font-weight:500; letter-spacing:-.01em; line-height:1.3; }
  .dp-fact-v .dp-cnt{ font-size:14px; font-weight:600; }
  .dp-brkwrap{ font-size:11.5px; color:var(--text-muted); font-variant-numeric:tabular-nums; }

  /* breakdown (dots) reutilizado del base */
  .dp-brk{ display:inline-flex; align-items:center; gap:5px; }
  .dp-brk b{ color:var(--text-primary); font-weight:600; }
  .dp-brk .rdot{ width:6px; height:6px; border-radius:50%; flex:none; }
  .dp-brk .rdot.acc{ background:var(--accent-on); }
  .dp-brk .rdot.neu{ background:var(--neutral); }
  .dp-sep{ opacity:.4; margin:0 2px; }

  /* ---------- FRANJAS CONDENSADAS (hoja de especificaciones · solo lectura) ----------
     Las 8 franjas reparten la altura restante con flex (flex:1 1 auto): siempre caben en
     el viewport y el espacio sobrante se distribuye. Datos: UNA línea horizontal por ítem. */
  .dp-franjas{ flex:1; min-height:0; display:flex; flex-direction:column; overflow:hidden; }
  .dp-franja{ position:relative; flex:1 1 auto; min-height:0; overflow:hidden;
    display:grid; grid-template-columns:minmax(150px,190px) 1fr; column-gap:clamp(12px,1.6vw,22px);
    align-items:center; padding:6px var(--pad); border-bottom:1px solid var(--hair);
    transition:background .15s ease; }
  .dp-franja:last-child{ border-bottom:0; }
  .dp-franja:nth-child(even){ background:var(--dot); }         /* zebra casi imperceptible */
  .dp-franja.hl{ background:var(--hl); }                       /* iluminada desde su icono del header */
  .dp-franja.hl .dp-franja-ic{ color:var(--accent-on); }

  .dp-franja-label{ display:flex; align-items:center; gap:10px; }
  .dp-franja-ic{ width:20px; height:20px; flex:none; display:grid; place-items:center;

  .dp-pair{ display:inline-flex; align-items:baseline; gap:6px; min-width:0; }
  .dp-pk{ font-size:10px; font-weight:600; letter-spacing:.06em; text-transform:uppercase; color:var(--text-muted); }
  .dp-pv{ font-weight:500; }
  .dp-dot{ color:var(--text-muted); opacity:.55; margin:0 -4px; }

  .dp-bcode{ min-width:26px; height:19px; padding:0 5px; flex:none; border-radius:6px; display:grid; place-items:center;

    line-height:1.45; }
  .dp-note-banner svg{ flex:none; margin-top:1px; }

  .dp-add{ width:100%; display:flex; align-items:center; justify-content:center; gap:8px;

/* ================= HELPERS ================= */
const fmt = n => '$' + new Intl.NumberFormat('es-CO').format(n||0);
function fdate(iso){ if(!iso) return '—'; const p=iso.split('-'); return p[2]+'/'+p[1]+'/'+p[0]; }
function initials(name){ const w=name.trim().split(/\s+/); return ((w[0]||'')[0]||'')+((w[1]||'')[0]||''); }
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m])); }
function primaryPhone(c){ const p=c.phones.find(x=>x.use)||c.phones[0]; return p?p.n:'—'; }
function primaryRole(c){ return c.credits.some(x=>x.role==='Titular')?'Titular':'Codeudor'; }
function plural(n,a,b){ return n===1?a:b; }
function reduceMotion(){ return window.matchMedia('(prefers-reduced-motion: reduce)').matches; }
function roleChip(role, sm){
  const acc = role==='Titular'||role==='Demandante';
  return '<span class="dp-role '+(acc?'acc':'neu')+(sm?' sm':'')+'">'+esc(role)+'</span>';
}
function roleCounts(c){
  const cr=c.credits||[], lg=c.legal||[];
  return {
    credTotal:cr.length,
    titular:cr.filter(x=>x.role==='Titular').length,
    codeudor:cr.filter(x=>x.role==='Codeudor').length,
    legalTotal:lg.length,
    demandante:lg.filter(x=>x.role==='Demandante').length,
    demandado:lg.filter(x=>x.role==='Demandado').length
  };
}
function note(t){ return '<div class="dp-empty">'+t+'</div>'; }
function brk(parts){
  const vis=parts.filter(p=>p[0]>0);
  if(!vis.length) return '<span class="muted">—</span>';
  return vis.map((p,i)=> (i>0?'<span class="dp-sep">·</span>':'')
    +'<span class="dp-brk"><span class="rdot '+(p[2]?'acc':'neu')+'"></span><b>'+p[0]+'</b> '+p[1]+'</span>').join('');
}

/* ================= VISTA LISTA (idéntica al base) ================= */
const tbody = document.getElementById('tbody');
const countEl = document.getElementById('count');
let bankFilter='all', query='';

function visibleClients(){
  const q = query.trim().toLowerCase().replace(/\./g,'');
  return CLIENTS.filter(c=>{
    const okBank = bankFilter==='all' || c.credits.some(cr=>cr.bank===bankFilter);
    const okQ = !q || c.name.toLowerCase().includes(q) || c.doc.replace(/\./g,'').includes(q);
    return okBank && okQ;
  });
}
function roleBadge(role, credits){
  const cls = role==='Titular' ? 'tit' : 'cod';
  return '<span class="lbadge"><span class="num">'+credits+'</span><span class="lrole '+cls+'">'+role+'</span></span>';
}
function renderRows(){
  const vis = visibleClients();
  countEl.innerHTML = '<b>'+vis.length+'</b> de '+CLIENTS.length+' clientes';
  if(!vis.length){
    tbody.innerHTML = '<tr><td colspan="5" class="muted" style="height:80px;text-align:center;">Sin resultados para tu búsqueda.</td></tr>';
    return;
  }
  tbody.innerHTML = vis.map(c=>{
    const role = primaryRole(c);
    return '<tr data-id="'+c.id+'" tabindex="0" role="button" aria-label="Ver detalle de '+esc(c.name)+'">'+
      '<td><div class="cell-client"><span class="cc-ava">'+esc(initials(c.name))+'</span>'+
        '<span class="cc-txt"><span class="cc-name">'+esc(c.name)+'</span>'+
        '<span class="cc-doc num">'+c.doc+'</span></span></div></td>'+
      '<td class="col-hide muted">'+c.docType+'</td>'+
      '<td class="col-hide num">'+esc(primaryPhone(c))+'</td>'+
      '<td>'+roleBadge(role, c.credits.length)+'</td>'+
      '<td class="r"><button class="row-more" aria-label="Más acciones" tabindex="-1">'+svg('more-horizontal',16)+'</button></td>'+
    '</tr>';
  }).join('');
}

function fact(k,v){ return '<div class="dp-fact"><div class="dp-fact-k">'+k+'</div><div class="dp-fact-v">'+v+'</div></div>'; }
function summaryBand(c){
  const rc=roleCounts(c);
  const pp=c.phones.find(p=>p.use)||c.phones[0];
  const pm=c.emails[0];
  const age=c.born ? (new Date().getFullYear()-c.born) : null;
  return '<div class="dp-summary">'
    +'<div class="dp-sum-id">'
      +'<span class="dp-sum-ava">'+esc(initials(c.name))+'</span>'
      +'<div>'
        +'<h2 class="dp-sum-name">'+esc(c.name)+'</h2>'
        +'<div class="dp-sum-doc tnum">'+esc(c.docType)+' '+esc(c.doc)
          +(age!=null?' <span class="dp-sep">·</span> '+age+' años':'')+'</div>'
      +'</div>'
    +'</div>'
    +'<span class="dp-vr"></span>'
    +'<div class="dp-sum-facts">'
      + fact('Correo actual', pm?esc(pm.a):'<span class="muted">Sin correo</span>')
      + fact('Teléfono actual', pp?'<span class="tnum">'+esc(pp.n)+'</span>':'<span class="muted">Sin teléfono</span>')
      + fact('Ciudad', esc(c.city))
    +'</div>'
    +'<span class="dp-vr"></span>'
    +'<div class="dp-sum-facts">'
      + fact('Créditos', '<span class="dp-cnt tnum">'+rc.credTotal+'</span> &nbsp;<span class="dp-brkwrap">'
          + brk([[rc.titular,'Titular',true],[rc.codeudor,'Codeudor',false]])+'</span>')
      + fact('Procesos jurídicos', rc.legalTotal
          ? '<span class="dp-cnt tnum">'+rc.legalTotal+'</span> &nbsp;<span class="dp-brkwrap">'
            + brk([[rc.demandante,'Demandante',true],[rc.demandado,'Demandado',false]])+'</span>'
          : '<span class="muted">Ninguno registrado</span>')
    +'</div>'
  +'</div>';
}

/* ---------- cuerpos de FRANJA condensados (UNA línea horizontal por ítem) ---------- */
function fTelefonos(c){
  if(!c.phones.length) return note('Sin teléfonos registrados.');
  return line(c.phones.map(p=>'<span class="dp-pv tnum">'+esc(p.n)+'</span>'
      +(p.use?'<span class="dp-role acc sm">En uso</span>'
        :'<span class="dp-pk" style="margin-left:2px">'+esc(p.label)+'</span>')).join(dot()));
}
function fCorreos(c){
  if(!c.emails.length) return note('Sin correos registrados.');
  return line(c.emails.map(m=>'<span class="dp-pv">'+esc(m.a)+'</span>'
      +'<span class="dp-pk" style="margin-left:2px">'+esc(m.label)+'</span>').join(dot()));
}
function fCreditos(c){
  if(!c.credits.length) return note('Sin créditos registrados.');
  return c.credits.map(cr=>{
    const b=BANKS[cr.bank]||{code:'—',name:cr.bank};
    return line(
      '<span class="dp-bcode tnum">'+b.code+'</span>'
      +'<span class="dp-lead">'+esc(b.name)+'</span>'
      + roleChip(cr.role,true)
      + pair('Operación', cr.op, true)
      + pair('Saldo', fmt(cr.balance), true)
      + pair('Vence', fdate(cr.due), true)
      + (cr.role==='Codeudor'? pair('Titular', esc(cr.holder)) : '')
    );
  }).join('');
}
function fJuridico(c){
  const lg=c.legal||[];
  if(!lg.length) return note('Sin procesos jurídicos registrados.');
  return lg.map(p=>line(
    '<span class="dp-lead">'+esc(p.type)+'</span>'
    + roleChip(p.role,true)
    + pair('Etapa', esc(p.stage))
    + pair('Radicado', esc(p.radicado), true)
    + (p.hearing? pair('Audiencia', fdate(p.hearing), true):'')
  )).join('');
}
function fResidencia(c){
  const r=c.residence.current;
  const hist=(c.residence.history||[]).length;
  return line(
    '<span class="dp-lead">'+esc(r.addr)+'</span>'+dot()
    +'<span class="dp-pv">'+esc(r.hood)+'</span>'+dot()
    +'<span class="dp-pv">'+esc(r.city)+'</span>'
    +'<span class="dp-role acc sm">Vigente</span>'
    +(hist? pair('Histórico', hist+' '+plural(hist,'domicilio anterior','domicilios anteriores')) : '')
  );
}
function fPropiedades(c){
  if(!c.properties.length) return note('Sin propiedades registradas.');
  return c.properties.map(p=>line(
    '<span class="dp-lead">'+esc(p.type)+'</span>'+dot()
    +'<span class="dp-pv">'+esc(p.addr)+'</span>'+dot()
    +'<span class="dp-pv">'+esc(p.hood)+'</span>'+dot()
    +'<span class="dp-pv">'+esc(p.city)+'</span>'
  )).join('');
}
function fVehiculos(c){
  if(!c.vehicles.length) return note('Sin vehículos registrados.');
  return c.vehicles.map(v=>line(
    '<span class="dp-lead">'+esc(v.desc)+'</span>'
    + pair('Placa', esc(v.plate), true)
    + pair('Año', v.year, true)
  )).join('');
}
function fLaboral(c){
  if(!c.work.length) return note('Sin información laboral registrada.');
  return c.work.map(w=>line(
    '<span class="dp-lead">'+esc(w.employer)+'</span>'
    +(w.status==='Activo'?'<span class="dp-role acc sm">Activo</span>'
      :'<span class="dp-role neu sm">'+esc(w.status)+'</span>')
    + pair('Ciudad', esc(w.city))
    + pair('Teléfono', esc(w.phone), true)
    + pair('Salario', w.salary>0?fmt(w.salary):'N/D', true)
  )).join('');
}
function fSalud(c){
  const h=c.health;
  return line(
    pair('Régimen', esc(h.regime))
    + pair('EPS', esc(h.eps)+' <span class="muted tnum">'+esc(h.epsCode)+'</span>')
    + pair('Afiliado', esc(h.type))
    +(h.status==='Activo'?'<span class="dp-role acc sm">Activo</span>'
      :'<span class="dp-role neu sm">'+esc(h.status)+'</span>')
  );
}
const BODY = {
  telefonos:fTelefonos, correos:fCorreos, creditos:fCreditos, juridico:fJuridico, residencia:fResidencia,
  propiedades:fPropiedades, vehiculos:fVehiculos, laboral:fLaboral, salud:fSalud
};
function franjaCount(key,c){
  if(key==='creditos') return c.credits.length;
  if(key==='juridico') return (c.legal||[]).length;
  if(key==='telefonos') return c.phones.length;
  if(key==='correos') return c.emails.length;
  if(key==='propiedades') return c.properties.length;
  if(key==='vehiculos') return c.vehicles.length;
  return null;
}
function franja(key,c){
  const m=META[key]; const n=franjaCount(key,c); const u=UNITS[key];
  const countLine = (n!=null)
    ? '<div class="dp-franja-n tnum">'+n+(u?' '+(n===1?u[0]:u[1]):'')+'</div>' : '';
  return '<section class="dp-franja" id="sec-'+key+'" aria-labelledby="lbl-'+key+'">'
    +'<div class="dp-franja-label">'
      +'<span class="dp-franja-ic">'+svg(m.icon,16)+'</span>'
      +'<div><h3 class="dp-franja-t" id="lbl-'+key+'">'+m.title+'</h3>'+countLine+'</div>'
    +'</div>'
    +'<div class="dp-lines">'+BODY[key](c)+'</div>'
  +'</section>';
}

function renderDetail(c){
  currentClient=c;
  const nav = NAV_GROUPS.map(g=>g.map(k=>{
    const s=META[k];
    return '<button class="dp-navbtn" data-drawer="'+s.key+'" data-tip="'+s.title+' — ficha completa y edición"'
      +' aria-haspopup="dialog" aria-expanded="false" aria-label="Abrir '+s.title+': ficha completa y edición">'
      + svg(s.icon,17)+'</button>';
  }).join('')).join('<span class="dp-navsep" aria-hidden="true"></span>');
  const html =
    '<div class="dp-bar">'
      +'<button class="btn btn-ghost" id="backBtn" aria-label="Volver a la lista">'+svg('arrow-left',16)+'Volver</button>'
      +'<div class="dp-bar-title">Detalle del cliente</div>'
      +'<nav class="dp-nav" aria-label="Secciones del cliente — abren el panel de detalle y edición">'+nav+'</nav>'
    +'</div>'
    + summaryBand(c)
    +'<div class="dp-franjas">'+ FRANJA_ORDER.map(k=>franja(k,c)).join('') +'</div>';
  detailEl.innerHTML=html;
  paintIcons(detailEl);
  document.getElementById('backBtn').addEventListener('click', closeDetail);
  /* Los iconos del header son la ÚNICA puerta al drawer de cada sección */
  detailEl.querySelector('.dp-nav').addEventListener('click', e=>{
    const b=e.target.closest('[data-drawer]'); if(b) openDrawer(b.dataset.drawer);
  });
  /* hover/focus de un icono ilumina su franja: refuerza el mapa icono→sección */
  detailEl.querySelectorAll('.dp-navbtn').forEach(b=>{
    const sec=()=>document.getElementById('sec-'+b.dataset.drawer);
    const on=()=>{ const s=sec(); if(s) s.classList.add('hl'); };
    const off=()=>{ const s=sec(); if(s) s.classList.remove('hl'); };
    b.addEventListener('mouseenter',on); b.addEventListener('mouseleave',off);
    b.addEventListener('focus',on);      b.addEventListener('blur',off);
  });
}

/* =========================================================================================
   DRAWER — formulario editable por sección (idéntico al base · mockup, sin guardado real)
   ========================================================================================= */
function slug(s){ return String(s).toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'')
  .replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,''); }
function fRow(label, value, mono){
  return '<label class="dp-f"><span class="dp-f-l">'+label+'</span>'
    +'<input class="dp-f-i'+(mono?' tnum':'')+'" type="text" name="'+slug(label)+'" value="'+esc(value==null?'':value)+'"></label>';
}
function fg2(a,b){ return '<div class="dp-fg2">'+a+b+'</div>'; }
function fBlock(title, tag, inner){
  return '<div class="dp-fblock">'
    +'<div class="dp-fblock-h"><span class="dp-fblock-t">'+title+'</span>'+(tag||'')+'</div>'
    + inner
  +'</div>';
}
function checkRow(label, checked){
  return '<label class="dp-check"><input type="checkbox" name="'+slug(label)+'"'+(checked?' checked':'')+'><span>'+label+'</span></label>';
}

function drawerTelefonos(c){
  if(!c.phones.length) return note('Sin teléfonos registrados. Usa «Agregar teléfono» para crear uno.');
  return c.phones.map((p,i)=>fBlock('Teléfono '+(i+1), p.use?'<span class="dp-role acc">En uso</span>':'',
    fg2(fRow('Número', p.n, true), fRow('Etiqueta', p.label))
    + checkRow('Marcar como teléfono en uso', p.use))).join('');
}
function drawerCorreos(c){
  if(!c.emails.length) return note('Sin correos registrados. Usa «Agregar correo» para crear uno.');
  return c.emails.map((m,i)=>fBlock('Correo '+(i+1), i===0?'<span class="dp-role acc">Principal</span>':'',
    fg2(fRow('Dirección', m.a), fRow('Etiqueta', m.label)))).join('');
}

/* --------- Registros nuevos: cada adder devuelve UN bloque editable vacío ---------
   Solo en secciones que el asesor captura en gestión (contacto, patrimonio, laboral).
   Créditos (vienen del banco), jurídico (modelo provisional) y salud (afiliación única)
   NO exponen adder. */
function newBlk(){ return '<span class="dp-role neu">Nuevo</span>'; }
const ADDERS = {
  telefonos:()=>fBlock('Teléfono nuevo', newBlk(),
    fg2(fRow('Número','',true), fRow('Etiqueta',''))+checkRow('Marcar como teléfono en uso', false)),
  correos:()=>fBlock('Correo nuevo', newBlk(),
    fg2(fRow('Dirección',''), fRow('Etiqueta',''))),
  residencia:()=>fBlock('Residencia anterior', newBlk(),
    fg2(fRow('Barrio',''), fRow('Periodo',''))+fRow('Ciudad','')),
  propiedades:()=>fBlock('Propiedad nueva', newBlk(),
    fg2(fRow('Tipo',''), fRow('Barrio',''))+fg2(fRow('Dirección',''), fRow('Ciudad',''))),
  vehiculos:()=>fBlock('Vehículo nuevo', newBlk(),
    fg2(fRow('Descripción',''), fRow('Año','',true))+fRow('Placa','',true)),
  laboral:()=>fBlock('Empleo nuevo', newBlk(),
    fg2(fRow('Empleador',''), fRow('Ciudad',''))+fg2(fRow('Teléfono','',true), fRow('Salario','',true))+fRow('Estado',''))
};
const ADD_LABELS = { telefonos:'Agregar teléfono', correos:'Agregar correo',
  residencia:'Agregar residencia anterior', propiedades:'Agregar propiedad',
  vehiculos:'Agregar vehículo', laboral:'Agregar empleo' };
function drawerCreditos(c){
  if(!c.credits.length) return note('Sin créditos registrados.');
  return c.credits.map((cr,i)=>{
    const b=BANKS[cr.bank]||{name:cr.bank};
    let inner=fg2(fRow('Banco', b.name), fRow('Rol', cr.role))
      + fg2(fRow('Operación', cr.op, true), fRow('Crédito', cr.credit, true))
      + fg2(fRow('Saldo del crédito', fmt(cr.balance), true), fRow('Capital', fmt(cr.capital), true))
      + fg2(fRow('Vence', fdate(cr.due), true), fRow('Ingreso', fdate(cr.open), true))
      + fg2(fRow('Sucursal', cr.branch), fRow('Asesor', cr.advisor));
    if(cr.role==='Codeudor') inner+=fRow('Titular del crédito', cr.holder);
    return fBlock('Crédito '+(i+1)+' · '+esc(b.name), roleChip(cr.role), inner);
  }).join('');
}
function drawerJuridico(c){
  const lg=c.legal||[];
  if(!lg.length) return note('Sin procesos jurídicos registrados.');
  return lg.map((p,i)=>{
    let inner=fRow('Naturaleza', p.type)
      + fRow('Radicado', p.radicado, true)
      + fRow('Juzgado', p.court)
      + fg2(fRow('Contraparte', p.counterpart), fRow('Fecha de radicación', fdate(p.filed), true))
      + fg2(fRow('Etapa', p.stage), fRow('Apoderado', p.lawyer||'—'))
      + (p.hearing?fRow('Próxima audiencia', fdate(p.hearing), true):'');
    return fBlock('Proceso '+(i+1), roleChip(p.role), inner);
  }).join('');
}
function drawerResidencia(c){
  const r=c.residence;
  let h=fBlock('Residencia vigente', '<span class="dp-role acc">Vigente</span>',
    fg2(fRow('Dirección', r.current.addr), fRow('Barrio', r.current.hood))
    + fRow('Ciudad', r.current.city));
  (r.history||[]).forEach((x,i)=>{
    h+=fBlock('Residencia anterior '+(i+1), '<span class="dp-role neu">Histórico</span>',
      fg2(fRow('Barrio', x.hood), fRow('Periodo', x.years))
      + fRow('Ciudad', x.city));
  });
  return h;
}
function drawerPropiedades(c){
  if(!c.properties.length) return note('Sin propiedades registradas.');
  return c.properties.map((p,i)=>fBlock('Propiedad '+(i+1), roleChip('Titular'),
    fg2(fRow('Tipo', p.type), fRow('Barrio', p.hood))
    + fg2(fRow('Dirección', p.addr), fRow('Ciudad', p.city)))).join('');
}
function drawerVehiculos(c){
  if(!c.vehicles.length) return note('Sin vehículos registrados.');
  return c.vehicles.map((v,i)=>fBlock('Vehículo '+(i+1), '',
    fg2(fRow('Descripción', v.desc), fRow('Año', v.year, true))
    + fRow('Placa', v.plate, true))).join('');
}
function drawerLaboral(c){
  if(!c.work.length) return note('Sin información laboral.');
  return c.work.map((w,i)=>fBlock('Empleo '+(i+1),
    w.status==='Activo'?'<span class="dp-role acc">Activo</span>':'<span class="dp-role neu">'+esc(w.status)+'</span>',
    fg2(fRow('Empleador', w.employer), fRow('Ciudad', w.city))
    + fg2(fRow('Teléfono', w.phone, true), fRow('Salario', w.salary>0?fmt(w.salary):'N/D', true))
    + fRow('Estado', w.status))).join('');
}
function drawerSalud(c){
  const h=c.health;
  return fBlock('Afiliación en salud', '',
    fg2(fRow('Régimen', h.regime), fRow('EPS', h.eps))
    + fg2(fRow('Código EPS', h.epsCode, true), fRow('Tipo de afiliado', h.type))
    + fRow('Estado', h.status));
}

const DRAWERS = {
  telefonos:{ title:'Teléfonos', sub:'Números de contacto del cliente', fn:drawerTelefonos },
  correos:{ title:'Correos', sub:'Direcciones de correo del cliente', fn:drawerCorreos },
  creditos:{ title:'Créditos', sub:'Operaciones del cliente', fn:drawerCreditos },
  juridico:{ title:'Procesos jurídicos', sub:'Rol de la persona en cada proceso', fn:drawerJuridico, note:true },
  residencia:{ title:'Residencia y ubicación', sub:'Domicilio vigente e histórico', fn:drawerResidencia },
  propiedades:{ title:'Propiedades', sub:'Bienes inmuebles registrados', fn:drawerPropiedades },
  vehiculos:{ title:'Vehículos', sub:'Vehículos registrados', fn:drawerVehiculos },
  laboral:{ title:'Información laboral', sub:'Empleo e ingresos', fn:drawerLaboral },
  salud:{ title:'Afiliación en salud', sub:'Régimen y EPS', fn:drawerSalud }
};

const overlay = document.getElementById('drawerOverlay');
const drawer = document.getElementById('drawer');
const drawerTitle = document.getElementById('drawerTitle');
const drawerSub = document.getElementById('drawerSub');
const drawerBody = document.getElementById('drawerBody');
const drawerCloseBtn = document.getElementById('drawerClose');
drawerCloseBtn.innerHTML = svg('x',18);
let lastFocus = null, drawerTimer = null;

function fillDrawer(key){
  const d=DRAWERS[key];
  drawerTitle.textContent=d.title;
  drawerSub.textContent=d.sub;
  let body='';
  if(d.note){
    body+='<div class="dp-note-banner">'+svg('scale',14)
      +'<span>Datos provisionales — el modelo jurídico aún no está definido.</span></div>';
  }
  body+=d.fn(currentClient);
  if(ADDERS[key]){
    body+='<button type="button" class="dp-add" data-add="'+key+'">'
      +svg('plus',15)+esc(ADD_LABELS[key])+'</button>';
  }
  drawerBody.innerHTML=body;
  paintIcons(drawerBody);
  drawerBody.scrollTop=0;
}
/* Crear un registro nuevo: inserta un bloque editable vacío antes del botón "agregar" */
drawerBody.addEventListener('click', e=>{
  const btn=e.target.closest('.dp-add'); if(!btn) return;
  const gen=ADDERS[btn.dataset.add]; if(!gen) return;
  const tmp=document.createElement('div'); tmp.innerHTML=gen();
  const block=tmp.firstElementChild;
  block.classList.add('isnew');
  paintIcons(block);
  btn.parentNode.insertBefore(block, btn);
  const first=block.querySelector('input'); if(first) first.focus();
  btn.scrollIntoView({block:'nearest', behavior:reduceMotion()?'auto':'smooth'});
});
function setNavOpen(key){
  const prev=detailEl.querySelector('.dp-navbtn.open');
  if(prev){ prev.classList.remove('open'); prev.setAttribute('aria-expanded','false'); }
  if(key){
    const b=detailEl.querySelector('.dp-navbtn[data-drawer="'+key+'"]');
    if(b){ b.classList.add('open'); b.setAttribute('aria-expanded','true'); }
  }
}
function openDrawer(key){
  if(!DRAWERS[key] || !currentClient) return;
  if(drawerTimer){ clearTimeout(drawerTimer); drawerTimer=null; }
  lastFocus=document.activeElement;
  fillDrawer(key);
  setNavOpen(key);
  overlay.hidden=false; drawer.hidden=false;
  void drawer.offsetWidth; /* forzar reflow para animar la entrada */
  overlay.classList.add('open'); drawer.classList.add('open');
  drawerCloseBtn.focus();
}
function closeDrawer(){
  drawer.classList.remove('open'); overlay.classList.remove('open');
  setNavOpen(null);
  const done=()=>{ drawer.hidden=true; overlay.hidden=true; drawerTimer=null; };
  if(reduceMotion()) done(); else drawerTimer=setTimeout(done,280);
  if(lastFocus && typeof lastFocus.focus==='function') lastFocus.focus();
}
overlay.addEventListener('click', closeDrawer);
document.getElementById('drawerCancel').addEventListener('click', closeDrawer);
document.getElementById('drawerSave').addEventListener('click', closeDrawer); /* mockup */
drawerCloseBtn.addEventListener('click', closeDrawer);
/* Esc + foco atrapado dentro del drawer */
drawer.addEventListener('keydown', e=>{
  if(e.key==='Escape'){ e.stopPropagation(); closeDrawer(); return; }
  if(e.key!=='Tab') return;
  const els=[...drawer.querySelectorAll('button,input,select,textarea,[tabindex]:not([tabindex="-1"])')]
    .filter(el=>!el.disabled && el.offsetParent!==null);
  if(!els.length) return;
  const first=els[0], last=els[els.length-1];
  if(e.shiftKey && document.activeElement===first){ e.preventDefault(); last.focus(); }
  else if(!e.shiftKey && document.activeElement===last){ e.preventDefault(); first.focus(); }
});
function drawerOpen(){ return !drawer.hidden; }

/* ================= NAVEGACIÓN LISTA <-> DETALLE (idéntica al base) ================= */
const listView=document.getElementById('listView');
const detailView=document.getElementById('detailView');
const content=document.querySelector('.content');

function openDetail(){
  listView.classList.add('hide');
  detailView.classList.add('show');
  content.scrollTop=0;
  detailView.focus();
}
function closeDetail(){
  if(drawerOpen()) closeDrawer();
  detailView.classList.remove('show');
  listView.classList.remove('hide');
  content.scrollTop=0;
}
tbody.addEventListener('click', e=>{
  if(e.target.closest('.row-more')) return;
  if(e.target.closest('tr[data-id]')) openDetail();
});
tbody.addEventListener('keydown', e=>{
  if((e.key==='Enter'||e.key===' ') && e.target.closest('tr[data-id]')){ e.preventDefault(); openDetail(); }
});
document.addEventListener('keydown', e=>{
  if(e.key!=='Escape') return;
  if(drawerOpen()){ closeDrawer(); return; }
  if(detailView.classList.contains('show')) closeDetail();
});

/* ================= FILTRO BANCO (idéntico al base) ================= */
const filterBtn=document.getElementById('filterBtn');
const filterMenu=document.getElementById('filterMenu');
const filterLbl=document.getElementById('filterLbl');
filterBtn.addEventListener('click',e=>{
  e.stopPropagation();
  const open=filterMenu.classList.toggle('open');
  filterBtn.setAttribute('aria-expanded', open);
});
filterMenu.addEventListener('click',e=>{
  const b=e.target.closest('button'); if(!b) return;
  bankFilter=b.dataset.bank;
  filterMenu.querySelectorAll('button').forEach(x=>x.setAttribute('aria-checked', x===b));
  filterLbl.textContent = bankFilter==='all' ? 'Banco' : (BANKS[bankFilter]?BANKS[bankFilter].name.split(' ')[0]:'Banco');
  filterMenu.classList.remove('open'); filterBtn.setAttribute('aria-expanded','false');
  renderRows();
});
document.addEventListener('click',e=>{
  if(!filterMenu.contains(e.target) && e.target!==filterBtn){
    filterMenu.classList.remove('open'); filterBtn.setAttribute('aria-expanded','false');
  }
});

/* ================= BÚSQUEDA ================= */
document.getElementById('q').addEventListener('input',e=>{ query=e.target.value; renderRows(); });

/* ================= TEMA ================= */
const tt=document.getElementById('themeToggle');
tt.addEventListener('click',()=>{
  const toLight=document.documentElement.getAttribute('data-theme')!=='light';
  document.documentElement.setAttribute('data-theme', toLight?'light':'dark');
  tt.setAttribute('aria-checked', toLight?'false':'true');
});

/* ================= RAIL ACTIVO ================= */
document.getElementById('rail').addEventListener('click',e=>{
  const it=e.target.closest('.rail-item'); if(!it || it.classList.contains('rail-logout')) return;
  document.querySelectorAll('#rail .rail-item').forEach(x=>{ x.classList.remove('active'); x.removeAttribute('aria-current'); });
  it.classList.add('active'); it.setAttribute('aria-current','page');
});

/* ================= INIT ================= */
paintIcons(document);
renderRows();
renderDetail(CLIENTS[0]);   // detalle SIEMPRE precargado con Marta Lucía Restrepo Ossa
</script>
